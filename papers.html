<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers &amp; Stories - Henrix Moyo</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="stylesheet" href="styles/main.css">
    <style>
        .papers-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #f0f0f0 0%, #fafafa 50%, #e8e8e8 100%);
            padding: 2rem 1.5rem 4rem;
        }

        .papers-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: rgba(0,0,0,0.6);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 2.5rem;
            transition: color 0.2s;
        }
        .papers-back:hover { color: rgba(0,0,0,0.9); }

        .papers-hero { margin-bottom: 3rem; }
        .papers-hero h1 {
            font-size: 2.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, #111 0%, #555 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0 0 0.5rem;
            line-height: 1.15;
        }
        .papers-hero p {
            font-size: 1.05rem;
            color: rgba(0,0,0,0.55);
            margin: 0;
        }

        .papers-section { margin-bottom: 3.5rem; }

        .section-label {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .section-label h2 {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(0,0,0,0.45);
            margin: 0;
            white-space: nowrap;
        }
        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(0,0,0,0.1);
        }

        .papers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.25rem;
        }

        /* ── Paper card ── */
        .paper-card {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid rgba(255,255,255,0.7);
            border-radius: 18px;
            padding: 1.75rem;
            box-shadow: 0 4px 24px rgba(0,0,0,0.07);
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
        }
        .paper-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.11);
        }

        .paper-card-meta {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .paper-type-badge {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
        }
        .paper-type-badge.paper   { background: #e8f4ff; color: #1a6fb5; }
        .paper-type-badge.story   { background: #f0eaff; color: #6b3fa0; }
        .paper-type-badge.article { background: #eafff0; color: #1a7a40; }

        .paper-date {
            font-size: 0.78rem;
            color: rgba(0,0,0,0.4);
        }

        .paper-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: rgba(0,0,0,0.9);
            margin: 0;
            line-height: 1.35;
        }

        .paper-excerpt {
            font-size: 0.875rem;
            color: rgba(0,0,0,0.6);
            line-height: 1.6;
            margin: 0;
            flex: 1;
        }

        .paper-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .paper-tag {
            font-size: 0.72rem;
            padding: 0.18rem 0.55rem;
            background: rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 8px;
            color: rgba(0,0,0,0.55);
        }

        .paper-read {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.82rem;
            font-weight: 500;
            color: rgba(0,0,0,0.45);
            transition: color 0.2s, gap 0.2s;
            margin-top: 0.25rem;
        }
        .paper-card:hover .paper-read {
            color: rgba(0,0,0,0.85);
            gap: 0.55rem;
        }

        /* ── Loading skeleton ── */
        .papers-skeleton {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.25rem;
        }
        .skeleton-card {
            background: rgba(255,255,255,0.5);
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 18px;
            padding: 1.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }
        .skeleton-line {
            height: 12px;
            border-radius: 6px;
            background: linear-gradient(90deg, rgba(0,0,0,0.06) 25%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.06) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s ease infinite;
        }
        .skeleton-line.short { width: 35%; }
        .skeleton-line.medium { width: 65%; }
        .skeleton-line.tall { height: 16px; width: 90%; }
        .skeleton-line.full { width: 100%; }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ── Empty state ── */
        .papers-empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
        }
        .papers-empty svg { margin-bottom: 1rem; opacity: 0.2; }
        .papers-empty h3 { font-size: 1rem; font-weight: 600; margin: 0 0 0.4rem; color: rgba(0,0,0,0.45); }
        .papers-empty p { font-size: 0.875rem; color: rgba(0,0,0,0.35); margin: 0; }

        /* ── Error state ── */
        .papers-error {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem 2rem;
            color: rgba(180,0,0,0.7);
            font-size: 0.9rem;
        }

        /* ── Dark mode ── */
        @media (prefers-color-scheme: dark) {
            .papers-page { background: linear-gradient(135deg, #1a1a1a 0%, #222 50%, #1a1a1a 100%); }
            .papers-back { color: rgba(255,255,255,0.5); }
            .papers-back:hover { color: rgba(255,255,255,0.9); }
            .papers-hero h1 {
                background: linear-gradient(135deg, #e8e8e8 0%, #aaa 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }
            .papers-hero p { color: rgba(255,255,255,0.45); }
            .section-label h2 { color: rgba(255,255,255,0.35); }
            .section-label::after { background: rgba(255,255,255,0.1); }
            .paper-card {
                background: rgba(38,38,40,0.8);
                border-color: rgba(255,255,255,0.1);
                box-shadow: 0 4px 24px rgba(0,0,0,0.3);
            }
            .paper-title { color: rgba(255,255,255,0.9); }
            .paper-excerpt { color: rgba(255,255,255,0.55); }
            .paper-date { color: rgba(255,255,255,0.3); }
            .paper-tag { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }
            .paper-read { color: rgba(255,255,255,0.35); }
            .paper-card:hover .paper-read { color: rgba(255,255,255,0.85); }
            .paper-type-badge.paper   { background: rgba(26,111,181,0.2); color: #7ab8e8; }
            .paper-type-badge.story   { background: rgba(107,63,160,0.2); color: #b89de0; }
            .paper-type-badge.article { background: rgba(26,122,64,0.2);  color: #7acf9a; }
            .skeleton-card { background: rgba(44,44,46,0.6); border-color: rgba(255,255,255,0.08); }
            .skeleton-line { background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%); background-size: 200% 100%; }
            .papers-empty h3 { color: rgba(255,255,255,0.35); }
            .papers-empty p { color: rgba(255,255,255,0.25); }
            .papers-error { color: rgba(255,120,120,0.8); }
        }

        @media (max-width: 768px) {
            .papers-page { padding: 1.25rem 1rem 3rem; }
            .papers-hero h1 { font-size: 2rem; }
            .papers-grid, .papers-skeleton { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="papers-page">
        <a href="index.html" class="papers-back">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Back to Profile
        </a>

        <div class="papers-hero">
            <h1>Papers &amp; Stories</h1>
            <p>Writing on technology, development, and ideas</p>
        </div>

        <div class="papers-section">
            <div class="section-label"><h2>Papers</h2></div>
            <div class="papers-grid" id="papers-grid">
                <!-- skeleton while loading -->
                <div class="papers-skeleton" id="papers-skeleton" style="display:contents">
                    <div class="skeleton-card">
                        <div class="skeleton-line short"></div>
                        <div class="skeleton-line tall"></div>
                        <div class="skeleton-line full"></div>
                        <div class="skeleton-line medium"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="papers-section">
            <div class="section-label"><h2>Stories</h2></div>
            <div class="papers-grid" id="stories-grid">
                <div class="papers-skeleton" id="stories-skeleton" style="display:contents">
                    <div class="skeleton-card">
                        <div class="skeleton-line short"></div>
                        <div class="skeleton-line tall"></div>
                        <div class="skeleton-line full"></div>
                        <div class="skeleton-line medium"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ARROW_SVG = `<svg width="12" height="12" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 3L11 8L6 13M11 8H1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>`;

        const EMPTY_PAPER_SVG = `<svg width="44" height="44" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M14 2H6C5.46957 2 4.96086 2.21071 4.58579 2.58579C4.21071 2.96086 4 3.46957 4 4V20C4 20.5304 4.21071 21.0391 4.58579 21.4142C4.96086 21.7893 5.46957 22 6 22H18C18.5304 22 19.0391 21.7893 19.4142 21.4142C19.7893 21.0391 20 20.5304 20 20V8L14 2Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M14 2V8H20M16 13H8M16 17H8M10 9H8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>`;

        const EMPTY_STORY_SVG = `<svg width="44" height="44" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>`;

        function formatDate(dateStr) {
            // Accepts "2025-01" or "2025-01-15"
            const [year, month] = dateStr.split('-');
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            return `${months[parseInt(month, 10) - 1]} ${year}`;
        }

        function buildCard(item) {
            const tags = (item.tags || []).map(t =>
                `<span class="paper-tag">${t}</span>`
            ).join('');

            const readLabel = item.type === 'story' ? 'Read story' : 'Read paper';

            return `
                <a href="papers/${item.file}" class="paper-card">
                    <div class="paper-card-meta">
                        <span class="paper-type-badge ${item.type}">${item.type.charAt(0).toUpperCase() + item.type.slice(1)}</span>
                        <span class="paper-date">${formatDate(item.date)}</span>
                    </div>
                    <h3 class="paper-title">${item.title}</h3>
                    <p class="paper-excerpt">${item.excerpt}</p>
                    ${tags ? `<div class="paper-tags">${tags}</div>` : ''}
                    <span class="paper-read">${readLabel} ${ARROW_SVG}</span>
                </a>`;
        }

        function renderEmpty(gridEl, type) {
            const svg = type === 'story' ? EMPTY_STORY_SVG : EMPTY_PAPER_SVG;
            const label = type === 'story' ? 'No stories yet' : 'No papers yet';
            gridEl.innerHTML = `
                <div class="papers-empty">
                    ${svg}
                    <h3>${label}</h3>
                    <p>Check back soon.</p>
                </div>`;
        }

        function renderError(gridEl, msg) {
            gridEl.innerHTML = `<div class="papers-error">Failed to load: ${msg}</div>`;
        }

        async function loadPapers() {
            const papersGrid  = document.getElementById('papers-grid');
            const storiesGrid = document.getElementById('stories-grid');

            try {
                const res = await fetch('papers/index.json');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const items = await res.json();

                const papers  = items.filter(i => i.type === 'paper' || i.type === 'article');
                const stories = items.filter(i => i.type === 'story');

                papersGrid.innerHTML  = papers.length  ? papers.map(buildCard).join('')  : '';
                storiesGrid.innerHTML = stories.length ? stories.map(buildCard).join('') : '';

                if (!papers.length)  renderEmpty(papersGrid,  'paper');
                if (!stories.length) renderEmpty(storiesGrid, 'story');

            } catch (err) {
                renderError(papersGrid,  err.message);
                renderError(storiesGrid, err.message);
            }
        }

        loadPapers();
    </script>
</body>
</html>
